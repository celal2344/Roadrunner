spring:
  application:
    name: roadrunner

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/roadrunner}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}

  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    validate-migration-naming: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

springdoc:
  api-docs:
    path: /scalar/openapi

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-change-this-secret-before-deployment-64-chars-minimum}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    db:
      enabled: true
    redis:
      enabled: true
