spring:
  application:
    name: roadrunner

  datasource:
    url: jdbc:mysql://localhost:3306/roadrunner
    username: root
    password: 3131
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    validate-migration-naming: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

springdoc:
  api-docs:
    path: /scalar/openapi
